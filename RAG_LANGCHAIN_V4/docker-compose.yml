services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: rag_app
        env_file:
            - .env
        environment:
            APP_ENV: docker
            MONGODB_URI: mongodb://mongo:27017
            QDRANT_URL: http://qdrant:6333
            OLLAMA_BASE_URL: http://ollama:11434
            HF_HOME: /root/.cache/huggingface
        depends_on:
            qdrant:
                condition: service_started
            ollama:
                condition: service_started
        command:
            - sh
            - -c
            - |
                set -eu
                model="$${OLLAMA_MODEL:-qwen2.5:3b}"
                num_ctx="$${OLLAMA_NUM_CTX:-2048}"
                until curl -fsS http://ollama:11434/api/tags >/dev/null; do
                    sleep 2
                done
                curl -fsS http://ollama:11434/api/pull \
                    -H "Content-Type: application/json" \
                    -d "{\"name\":\"$${model}\"}" >/dev/null
                curl -fsS http://ollama:11434/api/chat \
                    -H "Content-Type: application/json" \
                    -d "{\"model\":\"$${model}\",\"messages\":[{\"role\":\"user\",\"content\":\"\"}],\"stream\":false,\"keep_alive\":-1,\"options\":{\"num_ctx\":$${num_ctx}}}" >/dev/null
                exec uv run uvicorn src.api.main:app --host 0.0.0.0 --port 8000
        ports:
            - "8000:8000"
        volumes:
            - huggingface_cache:/root/.cache/huggingface
        networks:
            - default
            - cosmetics_shared

    qdrant:
        image: qdrant/qdrant:latest
        container_name: rag_qdrant
        restart: unless-stopped
        ports:
            - "6333:6333"
            - "6334:6334"
        volumes:
            - qdrant_data:/qdrant/storage

    ollama:
        image: ollama/ollama:latest
        container_name: rag_ollama
        restart: unless-stopped
        ports:
            - "11434:11434"
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          device_ids: ["0"]
                          capabilities: [gpu]
        volumes:
            - ollama_data:/root/.ollama

networks:
    cosmetics_shared:
        external: true
        name: cosmetics_shared_network

volumes:
    qdrant_data:
    ollama_data:
    huggingface_cache:
